spring.application.name=issue-tracker

# H2 Database Configuration (Default for development)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:issuetracker}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# MySQL Database Configuration (Uncomment to use)
# spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/issue_tracker}
# spring.datasource.username=${MYSQL_USERNAME:root}
# spring.datasource.password=${MYSQL_PASSWORD:root}
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=${JWT_SECRET:YOUR_JWT_SECRET_KEY_HERE_MIN_256_BITS}
jwt.expiration=86400000

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
